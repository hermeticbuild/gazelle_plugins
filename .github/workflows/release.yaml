name: release

on:
  push:
    tags:
      - 'import_extractor_v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS ARM64
            runner: macos-latest
            bazel_platform: //crates/import-extractor/platforms:darwin_arm64
            artifact_name: import_extractor-darwin-arm64
          - platform: Linux x86_64
            runner: ubuntu-latest
            bazel_platform: //crates/import-extractor/platforms:linux_x86_64
            artifact_name: import_extractor-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.platform }}
          repository-cache: true

      - name: Build binary
        run: |
          bazel build \
            --config=opt \
            --platforms=${{ matrix.bazel_platform }} \
            //crates/import-extractor:bin

          # Resolve the actual output path via cquery — rules_rs may rename or
          # suffix the artifact, so don't hardcode bazel-bin/.../bin.
          bin_path=$(bazel cquery \
            --config=opt \
            --platforms=${{ matrix.bazel_platform }} \
            --output=files //crates/import-extractor:bin)

          mkdir -p artifacts
          cp "$bin_path" artifacts/${{ matrix.artifact_name }}
          chmod +x artifacts/${{ matrix.artifact_name }}

      - name: Smoke test
        # The binary speaks length-prefixed protobuf on stdin, so there's no --version
        # to call. Pipe EOF and confirm clean exit (the I/O loop returns on n==0).
        run: |
          ./artifacts/${{ matrix.artifact_name }} < /dev/null
          test -x ./artifacts/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}
          retention-days: 7

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !inputs.dry_run }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Flatten artifact layout
        run: |
          ls -R release/
          mv release/import_extractor-darwin-arm64/import_extractor-darwin-arm64 release/.darwin-arm64
          mv release/import_extractor-linux-x64/import_extractor-linux-x64       release/.linux-x64
          rm -rf release/import_extractor-darwin-arm64 release/import_extractor-linux-x64
          mv release/.darwin-arm64 release/import_extractor-darwin-arm64
          mv release/.linux-x64    release/import_extractor-linux-x64

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 import_extractor-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/import_extractor_v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/import_extractor-darwin-arm64
            release/import_extractor-linux-x64
            release/checksums.txt
          body: |
            ## import-extractor ${{ github.ref_name }}

            Long-lived subprocess for extracting imports from TypeScript and Python.

            ### Binaries
            - **macOS Apple Silicon**: `import_extractor-darwin-arm64`
            - **Linux x86_64**: `import_extractor-linux-x64`

            ### Install

            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/import_extractor-darwin-arm64
            chmod +x import_extractor-darwin-arm64

            # Linux x86_64
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/import_extractor-linux-x64
            chmod +x import_extractor-linux-x64
            ```

            ### Verify

            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt
            shasum -a 256 -c checksums.txt
            ```
          draft: false
          prerelease: false
