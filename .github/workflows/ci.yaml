name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Emits the platform matrix once. macOS is dropped on pull_request runs
  # (saves runner minutes) but stays for push to main and the merge queue.
  # Linux runs inside debian:11 (glibc 2.31) — same glibc as BCR's
  # debian11 runner image. Catches glibc-version-specific link issues
  # (e.g. -ldl required for cgo'd Rust staticlibs) that Ubuntu 22.04 /
  # glibc 2.35 silently masks.
  matrix:
    name: matrix
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo 'platforms=[{"platform":"linux-debian11","runner":"ubuntu-latest","container":"debian:11"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'platforms=[{"platform":"linux-debian11","runner":"ubuntu-latest","container":"debian:11"},{"platform":"macos-arm64","runner":"macos-latest","container":""}]' >> "$GITHUB_OUTPUT"
          fi

  bazel-test:
    needs: matrix
    name: bazel ${{ matrix.bazel }} test (${{ matrix.os.platform }})
    runs-on: ${{ matrix.os.runner }}
    container: ${{ matrix.os.container }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix.outputs.platforms) }}
        bazel: ["8.5.1", "9.0.0"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}

    steps:
      # debian:11 is bare — install what bazel + cgo + actions/checkout
      # need. Skipped on macOS (no container; runner has these already).
      - name: Install build dependencies (debian)
        if: matrix.os.container != ''
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            ca-certificates curl git gcc g++ python3 unzip xz-utils
          # bazel-contrib/setup-bazel manages caches but assumes bazelisk is
          # already on PATH (true on github-hosted runners, not in containers).
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazelisk
          chmod +x /usr/local/bin/bazelisk

      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os.platform }}-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: bazel test //...
        run: bazelisk test //...

  # Examples are linux-only — they exercise the BUILD-generation path and
  # don't add platform-specific coverage worth the macOS runner cost.
  # Same debian11 container as bazel-test so glibc-2.31 link issues
  # surface here too (gazelle_ts is built as a tool inside each example).
  examples:
    name: example ${{ matrix.example }} (bazel ${{ matrix.bazel }})
    runs-on: ubuntu-latest
    container: debian:11
    strategy:
      fail-fast: false
      matrix:
        example: [basic, composite, graphql, advanced]
        bazel: ["8.5.1", "9.0.0"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            ca-certificates curl git gcc g++ python3 unzip xz-utils
          # bazel-contrib/setup-bazel manages caches but assumes bazelisk is
          # already on PATH (true on github-hosted runners, not in containers).
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazelisk
          chmod +x /usr/local/bin/bazelisk

      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-examples-${{ matrix.example }}-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: bazel test //... (examples/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: bazelisk test //...

      - name: gazelle idempotency check (examples/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: |
          bazelisk run //:gazelle -- update -mode=diff
