name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Emits the platform matrix once. macOS is dropped on pull_request runs
  # (saves runner minutes) but stays for push to main and the merge queue.
  matrix:
    name: matrix
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.set.outputs.platforms }}
    steps:
      - id: set
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo 'platforms=[{"platform":"linux-x86_64","runner":"ubuntu-latest"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'platforms=[{"platform":"linux-x86_64","runner":"ubuntu-latest"},{"platform":"macos-arm64","runner":"macos-latest"}]' >> "$GITHUB_OUTPUT"
          fi

  bazel-test:
    needs: matrix
    name: bazel ${{ matrix.bazel }} test (${{ matrix.os.platform }})
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix.outputs.platforms) }}
        bazel: ["8.5.1", "9.0.0"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os.platform }}-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: bazel test //...
        run: bazelisk test //...

  # Examples are linux-only — they exercise the BUILD-generation path and
  # don't add platform-specific coverage worth the macOS runner cost.
  # Each example runs as its own step (rather than a matrix entry) so the
  # whole set shares one runner and one Bazel install per bazel version.
  # `if: ${{ !cancelled() }}` keeps later steps running after a failure so
  # we still see the full matrix of which examples are broken.
  examples:
    name: examples (bazel ${{ matrix.bazel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ["8.5.1", "9.0.0"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-examples-bazel${{ matrix.bazel }}
          repository-cache: true

      - name: examples/basic
        working-directory: examples/basic
        run: |
          bazelisk test //...
          bazelisk run //:gazelle -- update -mode=diff

      - name: examples/composite
        if: ${{ !cancelled() }}
        working-directory: examples/composite
        run: |
          bazelisk test //...
          bazelisk run //:gazelle -- update -mode=diff

      - name: examples/graphql
        if: ${{ !cancelled() }}
        working-directory: examples/graphql
        run: |
          bazelisk test //...
          bazelisk run //:gazelle -- update -mode=diff

      - name: examples/advanced
        if: ${{ !cancelled() }}
        working-directory: examples/advanced
        run: |
          bazelisk test //...
          bazelisk run //:gazelle -- update -mode=diff
