name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bazel-test:
    name: bazel test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: macos-arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.platform }}
          repository-cache: true

      - name: bazel test //...
        run: bazelisk test //...

  examples:
    name: example ${{ matrix.example }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: [linux-x86_64, macos-arm64]
        example: [monorepo]
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: macos-arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-examples-${{ matrix.example }}-${{ matrix.platform }}
          repository-cache: true

      - name: bazel test //... (examples/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: bazelisk test //...

      - name: gazelle idempotency check (examples/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: |
          bazelisk run //:gazelle -- update -mode=diff
