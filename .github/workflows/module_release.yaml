name: module-release

# Releases the `gazelle_plugins` Bazel module to GitHub Releases and submits it
# to the Bazel Central Registry via bazel-contrib/publish-to-bcr.
#
# Tag scheme: `vX.Y.Z` (distinct from `import_extractor_v*`, which releases the
# Rust subprocess binary out of release.yaml). Both can coexist on the repo —
# this workflow only fires for module tags.
#
# Prerequisites for the BCR submission to succeed:
#   1. A fork of github.com/bazelbuild/bazel-central-registry under the org
#      (matches `registry_fork` below).
#   2. The `bazel-contrib/publish-to-bcr` GitHub App installed on the fork.
#   3. Repo secret `BCR_PUBLISH_TOKEN` — a fine-scoped PAT for the bot to push
#      to the registry fork. See
#      https://github.com/bazel-contrib/publish-to-bcr#a-note-on-release-automation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist.'
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - id: tag
        run: echo "value=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          # Need the tag's commits for `git archive`.
          ref: ${{ steps.tag.outputs.value }}
          fetch-depth: 0

      - name: Build source archive and release notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          .github/workflows/release_prep.sh "${{ steps.tag.outputs.value }}" \
            > release_notes.md
          ls -la gazelle_plugins-*.tar.gz

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body_path: release_notes.md
          files: gazelle_plugins-*.tar.gz
          fail_on_unmatched_files: true
          draft: false
          prerelease: false

  publish-to-bcr:
    needs: release
    # The reusable workflow downloads the release tarball, computes its
    # integrity, fills out .bcr/source.template.json + metadata.template.json,
    # and opens a PR against the configured registry fork.
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.2.0
    with:
      tag_name: ${{ needs.release.outputs.tag }}
      registry_fork: hermeticbuild/bazel-central-registry
      # Attestations are produced by bazel-contrib/release_ruleset; we don't
      # use that workflow, so the artifacts don't exist. Re-enable once we
      # wire up actions/attest-build-provenance for our tarball.
      attest: false
    permissions:
      attestations: write
      contents: write
      id-token: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
